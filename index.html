<!DOCTYPE html>
<html>
<head>
    <title>IoT Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📊 IoT Dashboard</h1>

<div class="container">

    <!-- ===== DEVICE 1 ===== -->
    <div class="device device1">
        <h2>🌱 TempHumid 01</h2>
        <p class="status" id="status1">🟡 Checking...</p>

        <!-- ⏱ Time Filter -->
        <div class="time-filter">
            <button onclick="setRange(1,'1h')">1H</button>
            <button onclick="setRange(1,'1d')">1D</button>
            <button onclick="setRange(1,'7d')">7D</button>
        </div>

        <div class="cards">
            <div class="card"><h3 id="temp1">-</h3></div>
            <div class="card"><h3 id="humid1">-</h3></div>
        </div>

        <!-- Soil -->
        <div class="soil-box">
            <h2>🌱 Soil</h2>
            <h1 id="soil1">-</h1>
        </div>

        <!-- กราฟ -->
        <canvas id="chartTemp1"></canvas>
        <canvas id="chartHumid1"></canvas>
    </div>

    <!-- ===== DEVICE 2 ===== -->
    <div class="device device2">
        <h2>🌱 TempHumid 02</h2>
        <p class="status" id="status2">🟡 Checking...</p>

        <!-- ⏱ Time Filter -->
        <div class="time-filter">
            <button onclick="setRange(2,'1h')">1H</button>
            <button onclick="setRange(2,'1d')">1D</button>
            <button onclick="setRange(2,'7d')">7D</button>
        </div>

        <div class="cards">
            <div class="card"><h3 id="temp2">-</h3></div>
            <div class="card"><h3 id="humid2">-</h3></div>
        </div>

        <!-- กราฟ -->
        <canvas id="chartTemp2"></canvas>
        <canvas id="chartHumid2"></canvas>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
